[cluster]
shared_geth_nodes = 1
beacon_nodes = 4
validators_total = 16

[simulation]
default_mode = "smoke"
interactive = true
edit_shadow_yaml_before_run = true
clean_runtime_before_prepare = true
work_dir = "runtime"
duration_seconds = 1800
shadow_parallelism = 6
shadow_heartbeat_interval = "1 sec"
shadow_use_worker_spinning = true
shadow_use_cpu_pinning = true
network_latency = "100 ms"
packet_route_cache = true
fast_file_sync = true
native_preemption_enabled = false
native_preemption_native_interval = "100 ms"
native_preemption_sim_interval = "10 ms"

[checkpoint_restore]
checkpoint_label = "tdt_real_clients"
warmup_seconds = 600
post_checkpoint_seconds = 120
post_restore_step_seconds = 60
post_restore_steps = 6
checkpoint_criu_jobs = 32
restore_protocol_mode = "deterministic_v2"
managed_external_paths = ["network", "beacon_peers.txt"]

[binaries]
shadow = ""
prysmctl = ""
criu = ""
geth = ""
beacon = ""
validator = ""
